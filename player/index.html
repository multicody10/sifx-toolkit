<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SIFX — Sound Image Format</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14; --surface:#141923; --surface-2:#1b2230; --line:#262e3d;
  --text:#e8ecf1; --text-dim:#7b8494;
  --amber:#ff8c2e; --teal:#5eead4; --teal-dim:#1c5a52; --red:#f87171;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  min-height:100vh; background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  display:flex; align-items:flex-start; justify-content:center; padding:32px 16px;
}
.app{ width:100%; max-width:520px; display:flex; flex-direction:column; gap:0; }

/* tabs */
.tabs{ display:flex; border-bottom:1px solid var(--line); margin-bottom:0; }
.tab{
  padding:10px 20px; font-family:'JetBrains Mono',monospace; font-size:12px;
  letter-spacing:.08em; cursor:pointer; color:var(--text-dim);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color .15s, border-color .15s; user-select:none;
}
.tab.active{ color:var(--teal); border-color:var(--teal); }

.panel{
  background:var(--surface); border:1px solid var(--line); border-top:none;
  border-radius:0 0 18px 18px; padding:28px;
}
h1{
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:24px;
  letter-spacing:-0.01em; margin-bottom:20px;
}
h1 .dot{color:var(--teal);}

/* drop zones */
.drop{
  border:1.5px dashed var(--line); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); cursor:pointer; overflow:hidden;
  position:relative; transition:border-color .15s;
}
.drop:hover, .drop.drag{ border-color:var(--teal); }
.drop img{ width:100%; height:100%; object-fit:cover; display:block; }
.drop .hint{
  color:var(--text-dim); font-size:12px; text-align:center; padding:20px;
  font-family:'JetBrains Mono',monospace; line-height:1.7; pointer-events:none;
}
.drop.loaded{ border-style:solid; }
input[type=file]{ display:none; }

/* chunk map */
.chunkmap{
  display:flex; height:20px; border-radius:6px; overflow:hidden;
  border:1px solid var(--line); margin-top:16px;
}
.chunk{
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:#0b0e14;
  white-space:nowrap; overflow:hidden;
}
.chunk.img{ background:var(--amber); }
.chunk.saud{ background:var(--teal); }
.chunk.saud.on{ animation:breathe 2.4s ease-in-out infinite; }
@keyframes breathe{ 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.4);} }
.chunk.other{ background:var(--text-dim); }
.legend{
  display:flex; gap:14px; margin-top:8px;
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
}
.legend span{ display:inline-flex; align-items:center; gap:6px; }
.swatch{ width:8px; height:8px; border-radius:2px; }

/* status + controls */
.status{
  margin-top:16px; font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--text-dim); min-height:18px; line-height:1.6;
}
.ok{color:var(--teal);} .warn{color:var(--amber);} .err{color:var(--red);}
.controls{
  margin-top:12px; display:flex; align-items:center; gap:14px;
  opacity:.3; pointer-events:none; transition:opacity .15s;
}
.controls.on{ opacity:1; pointer-events:auto; }
.playbtn{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:72px; height:72px; border-radius:50%; border:1px solid rgba(255,255,255,.35);
  background:rgba(94,234,212,.92); color:#0b0e14; font-size:26px;
  cursor:pointer; display:none; align-items:center; justify-content:center;
  box-shadow:0 14px 36px rgba(0,0,0,.38); backdrop-filter:blur(8px);
  transition:transform .15s, background .15s, opacity .15s;
  z-index:2;
}
.playbtn:hover{ transform:translate(-50%,-50%) scale(1.04); background:var(--teal); }
.playbtn.on{ display:flex; }
.playbtn.playing{ opacity:.78; }
.drop.loaded:hover .playbtn.playing{ opacity:1; }
.playbtn:disabled{ opacity:.45; cursor:default; transform:translate(-50%,-50%); }
.playbtn:focus-visible{ outline:2px solid var(--text); outline-offset:4px; }
.drop.loaded::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 55%, rgba(0,0,0,.34));
  pointer-events:none;
  z-index:1;
}
.controls label{
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
  display:flex; align-items:center; gap:8px; flex:1;
}
input[type=range]{ flex:1; accent-color:var(--teal); }

/* encoder panel */
.row{ display:flex; gap:14px; }
.row .drop{ flex:1; aspect-ratio:1; }
.row .audio-drop{
  flex:1; aspect-ratio:1; flex-direction:column; gap:8px;
  display:flex; align-items:center; justify-content:center;
}
.audio-icon{ font-size:28px; }

.field{
  margin-top:14px; display:flex; flex-direction:column; gap:6px;
}
.field label{
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
  display:flex; justify-content:space-between; align-items:center;
}
.field input[type=range]{ width:100%; accent-color:var(--teal); }
.toggle-row{ display:flex; gap:12px; margin-top:14px; }
.toggle-btn{
  flex:1; padding:9px; border:1.5px solid var(--line); border-radius:8px;
  background:var(--surface-2); color:var(--text-dim); cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-size:11px; transition:all .15s;
}
.toggle-btn.active{ border-color:var(--teal); color:var(--teal); background:var(--teal-dim); }

.create-btn{
  margin-top:18px; width:100%; padding:13px; border:none; border-radius:10px;
  background:var(--teal); color:#0b0e14; font-family:'Space Grotesk',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s;
}
.create-btn:disabled{ opacity:.35; cursor:default; }
.create-btn.working{ opacity:.7; }

.download-area{
  margin-top:16px; display:none;
  background:var(--surface-2); border:1px solid var(--teal-dim);
  border-radius:10px; padding:14px 16px;
  font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--teal);
  display:none; align-items:center; justify-content:space-between; gap:12px;
}
.download-area.show{ display:flex; }
.dl-btn{
  padding:7px 14px; border:1.5px solid var(--teal); background:transparent;
  color:var(--teal); border-radius:7px; font-family:'JetBrains Mono',monospace;
  font-size:11px; cursor:pointer; white-space:nowrap; text-decoration:none;
}
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <div class="tab active" id="tabPlay" onclick="switchTab('play')">play</div>
    <div class="tab" id="tabCreate" onclick="switchTab('create')">create</div>
  </div>

  <!-- PLAY PANEL -->
  <div class="panel" id="panelPlay">
    <h1>sifx<span class="dot">.</span>player</h1>
    <div class="drop" id="playDrop" style="aspect-ratio:1">
      <div class="hint" id="playHint">drop a .sifx file here<br>or click to choose</div>
      <img id="playPreview" hidden alt="">
      <button class="playbtn" id="playBtn" type="button" aria-label="Play SIFX audio">&#9658;</button>
    </div>
    <input type="file" id="playFile" accept=".sifx,.webp,image/webp">
    <div class="chunkmap" id="chunkmap" hidden></div>
    <div class="legend" id="legend" hidden>
      <span><i class="swatch" style="background:var(--amber)"></i>image (every viewer)</span>
      <span><i class="swatch" style="background:var(--teal)"></i>SAUD (this player)</span>
    </div>
    <div class="status" id="playStatus">drop a .sifx to begin</div>
    <div class="controls" id="controls">
      <label>gain
        <input type="range" id="gainSlider" min="-30" max="6" value="0" step="1">
        <span id="gainVal">0 dB</span>
      </label>
    </div>
  </div>

  <!-- CREATE PANEL -->
  <div class="panel" id="panelCreate" hidden>
    <h1>sifx<span class="dot">.</span>create</h1>
    <div class="row">
      <div class="drop" id="imgDrop">
        <div class="hint" id="imgHint">image<br><small>png / jpg / webp / gif</small></div>
        <img id="imgPreview" hidden alt="">
      </div>
      <input type="file" id="imgFile" accept="image/*">
      <div class="drop audio-drop" id="audDrop">
        <div id="audIcon" class="audio-icon">&#127925;</div>
        <div class="hint" id="audHint">audio<br><small>mp3 / wav / ogg / flac</small></div>
      </div>
      <input type="file" id="audFile" accept="audio/*">
    </div>

    <div class="toggle-row">
      <button class="toggle-btn active" id="btnLoop" onclick="setLoop(true)">loop</button>
      <button class="toggle-btn" id="btnOnce" onclick="setLoop(false)">play once</button>
    </div>
    <div class="field">
      <label>gain <span id="gainCreateVal">0 dB</span></label>
      <input type="range" id="gainCreate" min="-30" max="6" value="0" step="1"
        oninput="document.getElementById('gainCreateVal').textContent=this.value+' dB'">
    </div>
    <div class="field">
      <label>crossfade <span id="xfadeVal">30 ms</span></label>
      <input type="range" id="xfadeMs" min="0" max="100" value="30" step="5"
        oninput="document.getElementById('xfadeVal').textContent=this.value+' ms'">
    </div>

    <div class="status" id="createStatus">choose an image and an audio file</div>
    <button class="create-btn" id="createBtn" disabled onclick="buildSifx()">create .sifx</button>
    <div class="download-area" id="dlArea">
      <span id="dlInfo">ready</span>
      <a id="dlLink" class="dl-btn" download="output.sifx">download</a>
    </div>
  </div>
</div>

<!-- vendored browser decoders -->
<script src="opus-decoder.min.js" charset="UTF-8"></script>
<!-- Opus WASM encoder (opusscript) -->
<script src="opusscript_native_wasm_binary.js" charset="UTF-8"></script>
<script src="opusscript_native_wasm.js" charset="UTF-8"></script>

<script>
'use strict';

// ---- tab switching ----
function switchTab(t) {
  document.getElementById('panelPlay').hidden = t !== 'play';
  document.getElementById('panelCreate').hidden = t !== 'create';
  document.getElementById('tabPlay').classList.toggle('active', t === 'play');
  document.getElementById('tabCreate').classList.toggle('active', t === 'create');
}

// ---- shared RIFF parser (decode path) ----
const td = new TextDecoder('ascii');
function parseRiff(ab) {
  if (td.decode(ab.slice(0,4)) !== 'RIFF') throw new Error('not a RIFF file');
  const dv = new DataView(ab);
  const chunks = [];
  let off = 12;
  while (off + 8 <= ab.byteLength) {
    const id = td.decode(ab.slice(off, off+4));
    const size = dv.getUint32(off+4, true);
    const ds = off + 8;
    if (ds + size > ab.byteLength) break;
    chunks.push({ id, size, dataStart: ds });
    off = ds + size + (size % 2);
  }
  return chunks;
}
function parseSaud(ab, ds, size) {
  const dv = new DataView(ab, ds, size);
  return {
    loopMode:      dv.getUint8(1),
    gainCentibels: dv.getInt16(2, true),
    crossfadeMs:   dv.getUint32(4, true),
    sampleRate:    dv.getUint32(8, true),
    channels:      dv.getUint8(12),
    frameSamples:  dv.getUint16(14, true),
    totalFrames:   dv.getUint32(16, true),
    packetCount:   dv.getUint32(20, true),
    packets: (() => {
      const pkts = [];
      let o = 24;
      for (let i = 0, n = dv.getUint32(20, true); i < n; i++) {
        const len = dv.getUint16(o, true);
        pkts.push(new Uint8Array(ab, ds + o + 2, len));
        o += 2 + len;
      }
      return pkts;
    })()
  };
}

// ---- RIFF builder (encode path) ----
function buildRiff(chunks) {
  let bodyLen = 0;
  for (const c of chunks) bodyLen += 8 + c.payload.length + (c.payload.length % 2);
  const out = new Uint8Array(12 + bodyLen);
  const dv = new DataView(out.buffer);
  const te = new TextEncoder();
  out.set(te.encode('RIFF'), 0);
  dv.setUint32(4, 4 + bodyLen, true);  // RIFF size = format tag + chunks
  out.set(te.encode('WEBP'), 8);
  let off = 12;
  for (const c of chunks) {
    out.set(te.encode(c.id.padEnd(4,' ')), off);
    dv.setUint32(off+4, c.payload.length, true);
    out.set(c.payload, off+8);
    off += 8 + c.payload.length + (c.payload.length % 2);
  }
  return out;
}

// ---- SAUD chunk builder (encode path) ----
function buildSaud({ loopMode, gainCentibels, crossfadeMs, sampleRate, channels, frameSamples, totalFrames, packets }) {
  let bodyLen = 24;
  for (const p of packets) bodyLen += 2 + p.length;
  const buf = new Uint8Array(bodyLen);
  const dv = new DataView(buf.buffer);
  buf[0] = 1;                                       // version
  buf[1] = loopMode;
  dv.setInt16(2, gainCentibels, true);
  dv.setUint32(4, crossfadeMs, true);
  dv.setUint32(8, sampleRate, true);
  buf[12] = channels;
  buf[13] = 0;
  dv.setUint16(14, frameSamples, true);
  dv.setUint32(16, totalFrames, true);
  dv.setUint32(20, packets.length, true);
  let off = 24;
  for (const p of packets) {
    dv.setUint16(off, p.length, true);
    buf.set(p, off+2);
    off += 2 + p.length;
  }
  return buf;
}

// ---- crossfade (encode path) ----
function crossfade(f32, channels, sampleRate, fadeMs) {
  const frames = f32[0].length;
  let fadeFr = Math.round(sampleRate * fadeMs / 1000);
  fadeFr = Math.min(fadeFr, Math.floor(frames / 2));
  if (fadeFr <= 0) return { data: f32, fadeMsUsed: 0 };
  const outFr = frames - fadeFr;
  const out = f32.map(() => new Float32Array(outFr));
  for (let i = 0; i < fadeFr; i++) {
    const w = 0.5 * (1 - Math.cos(Math.PI * i / fadeFr));
    const tail = frames - fadeFr + i;
    for (let ch = 0; ch < channels; ch++) {
      out[ch][i] = f32[ch][i] * w + f32[ch][tail] * (1 - w);
    }
  }
  for (let i = fadeFr; i < outFr; i++) {
    for (let ch = 0; ch < channels; ch++) out[ch][i] = f32[ch][i];
  }
  return { data: out, fadeMsUsed: Math.round(fadeFr * 1000 / sampleRate) };
}

// ---- opusscript WASM encoder init ----
let opusNative = null;
function decodeBase64Bytes(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function opusModuleOptions(resolve) {
  const options = { onRuntimeInitialized() { opusNative = this; resolve(); } };
  if (typeof OPUSSCRIPT_NATIVE_WASM_BASE64 === 'string') {
    options.wasmBinary = decodeBase64Bytes(OPUSSCRIPT_NATIVE_WASM_BASE64);
  }
  return options;
}
let opusReady = new Promise((resolve, reject) => {
  // opusscript_native_wasm.js exports a factory function as a UMD module.
  // The global is set differently in browser vs Node; find it.
  const factory = (typeof Module !== 'undefined' && typeof Module === 'function')
    ? Module
    : (typeof opusscript_native_wasm !== 'undefined' ? opusscript_native_wasm : null);

  if (!factory) {
    // If the script hasn't finished yet, wait
    window.addEventListener('load', () => {
      const f2 = window.Module || window.opusscript_native_wasm;
      if (typeof f2 === 'function') {
        f2(opusModuleOptions(resolve));
      } else {
        reject(new Error('opusscript WASM factory not found'));
      }
    });
    return;
  }

  factory(opusModuleOptions(resolve));
});

function encodeToOpusPackets(channelData, channels, sampleRate, frameSamples) {
  if (!opusNative) throw new Error('Opus encoder not ready');
  if (channels < 1 || channels > 2) throw new Error('Opus encoding supports mono or stereo audio');
  const totalFrames = channelData[0].length;
  const paddedFrames = Math.ceil(totalFrames / frameSamples) * frameSamples;
  const maxFrameSize = sampleRate * 60 / 1000;
  const maxPacketSize = 1276 * 3;

  const inPtr = opusNative._malloc(maxFrameSize * channels * 2);
  const inPCM = opusNative.HEAPU16.subarray(inPtr, inPtr + maxFrameSize * channels * 2);
  const outPtr = opusNative._malloc(maxPacketSize);
  const outOpus = opusNative.HEAPU8.subarray(outPtr, outPtr + maxPacketSize);
  const handler = new opusNative.OpusScriptHandler(sampleRate, channels, 2049); // 2049=AUDIO
  const packets = [];

  try {
    const frameBytes = new Uint8Array(frameSamples * channels * 2);
    const frameView = new DataView(frameBytes.buffer);
    for (let f = 0; f < paddedFrames; f += frameSamples) {
      let o = 0;
      for (let i = 0; i < frameSamples; i++) {
        const src = (f + i) < totalFrames ? (f + i) : (f + i) % totalFrames;
        for (let ch = 0; ch < channels; ch++) {
          const v = channelData[ch][src];
          const s = Math.max(-32768, Math.min(32767, Math.round(v * 32767)));
          frameView.setInt16(o, s, true);
          o += 2;
        }
      }

      inPCM.set(frameBytes);
      const len = handler._encode(inPCM.byteOffset, frameBytes.length, outPtr, frameSamples);
      if (len <= 0) throw new Error(`Opus encode error: ${len}`);
      packets.push(outOpus.subarray(0, len).slice());
    }
  } finally {
    opusNative.OpusScriptHandler.destroy_handler(handler);
    opusNative._free(inPtr);
    opusNative._free(outPtr);
  }

  return { packets, totalFrames };
}

// ---- image → WebP via canvas ----
async function imageToWebP(file) {
  const bmp = await createImageBitmap(file);
  const canvas = new OffscreenCanvas(bmp.width, bmp.height);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(bmp, 0, 0);
  const blob = await canvas.convertToBlob({ type: 'image/webp', quality: 0.92 });
  return new Uint8Array(await blob.arrayBuffer());
}

// ---- audio → resampled Float32 PCM via OfflineAudioContext ----
async function audioToF32(file, targetSR = 48000) {
  const raw = await file.arrayBuffer();
  const tempCtx = new AudioContext();
  const decoded = await tempCtx.decodeAudioData(raw);
  await tempCtx.close();
  const channels = decoded.numberOfChannels;
  const outFrames = Math.round(decoded.duration * targetSR);
  const offline = new OfflineAudioContext(channels, outFrames, targetSR);
  const src = offline.createBufferSource();
  src.buffer = decoded;
  src.connect(offline.destination);
  src.start(0);
  const rendered = await offline.startRendering();
  return Array.from({ length: channels }, (_, ch) => rendered.getChannelData(ch));
}

// ---- play panel ----
const playDrop = document.getElementById('playDrop');
const playFile = document.getElementById('playFile');
const playPreview = document.getElementById('playPreview');
const playHint = document.getElementById('playHint');
const chunkmap = document.getElementById('chunkmap');
const legend = document.getElementById('legend');
const playStatus = document.getElementById('playStatus');
const controls = document.getElementById('controls');
const playBtn = document.getElementById('playBtn');
const gainSlider = document.getElementById('gainSlider');
const gainVal = document.getElementById('gainVal');

let audioCtx, srcNode, gainNode, audioBuf, loopMode, isPlaying = false;

playDrop.addEventListener('click', () => audioBuf ? toggleAudio() : playFile.click());
['dragenter','dragover'].forEach(e => playDrop.addEventListener(e, ev => { ev.preventDefault(); playDrop.classList.add('drag'); }));
['dragleave','drop'].forEach(e => playDrop.addEventListener(e, ev => { ev.preventDefault(); playDrop.classList.remove('drag'); }));
playDrop.addEventListener('drop', ev => ev.dataTransfer.files[0] && loadSifx(ev.dataTransfer.files[0]));
playFile.addEventListener('change', ev => ev.target.files[0] && loadSifx(ev.target.files[0]));

async function loadSifx(file) {
  stopAudio();
  audioBuf = null;
  const ab = await file.arrayBuffer();
  playPreview.src = URL.createObjectURL(new Blob([ab], { type:'image/webp' }));
  playPreview.hidden = false; playHint.hidden = true;
  playDrop.classList.add('loaded');
  playBtn.disabled = true;
  playBtn.classList.remove('on', 'playing');
  controls.classList.remove('on');

  let chunks;
  try { chunks = parseRiff(ab); } catch(e) { setPlayStatus('err', e.message); return; }

  chunkmap.hidden = false; legend.hidden = false;
  chunkmap.innerHTML = '';
  for (const c of chunks) {
    const el = document.createElement('div');
    el.style.width = Math.max(4, c.size / ab.byteLength * 100) + '%';
    el.className = 'chunk ' + (c.id.startsWith('VP8') ? 'img' : c.id === 'SAUD' ? 'saud' : 'other');
    el.textContent = c.id.trim();
    chunkmap.appendChild(el);
  }

  const sc = chunks.find(c => c.id === 'SAUD');
  if (!sc) { setPlayStatus('warn', 'no audio track found in this file'); return; }

  const s = parseSaud(ab, sc.dataStart, sc.size);
  loopMode = s.loopMode === 1 ? 'loop' : 'once';
  gainSlider.value = Math.round(s.gainCentibels / 100);
  gainVal.textContent = gainSlider.value + ' dB';

  setPlayStatus('dim', `decoding ${s.packets.length} Opus packets…`);
  try {
    const { OpusDecoder } = window['opus-decoder'];
    const dec = new OpusDecoder({ sampleRate: s.sampleRate, channels: s.channels });
    await dec.ready;
    const result = dec.decodeFrames(s.packets.map(p => new Uint8Array(p)));
    dec.free();

    audioCtx = audioCtx || new AudioContext();
    audioBuf = audioCtx.createBuffer(s.channels, s.totalFrames, s.sampleRate);
    for (let ch = 0; ch < s.channels; ch++)
      audioBuf.copyToChannel(result.channelData[ch].slice(0, s.totalFrames), ch);

    document.querySelector('.chunk.saud')?.classList.add('on');
    setPlayStatus('ok', `ready — ${audioBuf.duration.toFixed(2)}s ${loopMode}`);
    controls.classList.add('on');
    playBtn.disabled = false;
    playBtn.classList.add('on');
  } catch(e) { setPlayStatus('err', 'decode failed: ' + e.message); }
}

function setPlayStatus(cls, msg) {
  playStatus.innerHTML = cls === 'dim' ? msg
    : `<span class="${cls}">${msg}</span>`;
}

function db2gain(db) { return Math.pow(10, db / 20); }

function stopAudio() {
  if (srcNode) { try { srcNode.stop(); } catch(e){} srcNode.disconnect(); srcNode = null; }
  isPlaying = false; playBtn.textContent = '▶';
}
function startAudio() {
  if (!audioBuf) return;
  audioCtx.resume();
  srcNode = audioCtx.createBufferSource();
  srcNode.buffer = audioBuf;
  srcNode.loop = loopMode === 'loop';
  gainNode = audioCtx.createGain();
  gainNode.gain.value = db2gain(parseFloat(gainSlider.value));
  srcNode.connect(gainNode).connect(audioCtx.destination);
  srcNode.onended = () => { if (loopMode !== 'loop') stopAudio(); };
  srcNode.start();
  isPlaying = true; playBtn.textContent = '❙❙';
}
const stopAudioBase = stopAudio;
stopAudio = function stopAudioOverlay() {
  stopAudioBase();
  playBtn.innerHTML = '&#9658;';
  playBtn.textContent = '▶';
  playBtn.setAttribute('aria-label', 'Play SIFX audio');
  playBtn.classList.remove('playing');
};
const startAudioBase = startAudio;
startAudio = function startAudioOverlay() {
  startAudioBase();
  if (!audioBuf) return;
  playBtn.innerHTML = '&#10074;&#10074;';
  playBtn.textContent = '❚❚';
  playBtn.setAttribute('aria-label', 'Pause SIFX audio');
  playBtn.classList.add('playing');
};
playBtn.addEventListener('click', ev => ev.stopPropagation(), true);
playBtn.addEventListener('click', () => isPlaying ? stopAudio() : startAudio());
function renderPlayState() {
  playBtn.innerHTML = isPlaying ? '&#10074;&#10074;' : '&#9658;';
  playBtn.setAttribute('aria-label', isPlaying ? 'Pause SIFX audio' : 'Play SIFX audio');
  playBtn.classList.toggle('playing', isPlaying);
}
stopAudio = function stopAudioFixed() {
  if (srcNode) {
    try { srcNode.stop(); } catch(e) {}
    srcNode.disconnect();
    srcNode = null;
  }
  isPlaying = false;
  renderPlayState();
};
async function startAudioFixed() {
  if (!audioBuf || isPlaying) return;
  audioCtx = audioCtx || new AudioContext();
  await audioCtx.resume();
  srcNode = audioCtx.createBufferSource();
  srcNode.buffer = audioBuf;
  srcNode.loop = loopMode === 'loop';
  gainNode = audioCtx.createGain();
  gainNode.gain.value = db2gain(parseFloat(gainSlider.value));
  srcNode.connect(gainNode).connect(audioCtx.destination);
  srcNode.onended = () => { if (loopMode !== 'loop') stopAudio(); };
  srcNode.start();
  isPlaying = true;
  renderPlayState();
}
function toggleAudio() {
  isPlaying ? stopAudio() : startAudioFixed();
}
playBtn.addEventListener('click', ev => {
  ev.preventDefault();
  ev.stopImmediatePropagation();
  toggleAudio();
}, true);
gainSlider.addEventListener('input', () => {
  gainVal.textContent = gainSlider.value + ' dB';
  if (gainNode) gainNode.gain.value = db2gain(parseFloat(gainSlider.value));
});

// ---- create panel ----
const imgDrop = document.getElementById('imgDrop');
const imgFile = document.getElementById('imgFile');
const imgPreview = document.getElementById('imgPreview');
const imgHint = document.getElementById('imgHint');
const audDrop = document.getElementById('audDrop');
const audFile = document.getElementById('audFile');
const audIcon = document.getElementById('audIcon');
const audHint = document.getElementById('audHint');
const createStatus = document.getElementById('createStatus');
const createBtn = document.getElementById('createBtn');
const dlArea = document.getElementById('dlArea');
const dlLink = document.getElementById('dlLink');
const dlInfo = document.getElementById('dlInfo');

let imgFileObj = null, audFileObj = null, loopCreate = true;

imgDrop.addEventListener('click', () => imgFile.click());
['dragenter','dragover'].forEach(e => imgDrop.addEventListener(e, ev => { ev.preventDefault(); imgDrop.classList.add('drag'); }));
['dragleave','drop'].forEach(e => imgDrop.addEventListener(e, ev => { ev.preventDefault(); imgDrop.classList.remove('drag'); }));
imgDrop.addEventListener('drop', ev => ev.dataTransfer.files[0] && pickImage(ev.dataTransfer.files[0]));
imgFile.addEventListener('change', ev => ev.target.files[0] && pickImage(ev.target.files[0]));

audDrop.addEventListener('click', () => audFile.click());
['dragenter','dragover'].forEach(e => audDrop.addEventListener(e, ev => { ev.preventDefault(); audDrop.classList.add('drag'); }));
['dragleave','drop'].forEach(e => audDrop.addEventListener(e, ev => { ev.preventDefault(); audDrop.classList.remove('drag'); }));
audDrop.addEventListener('drop', ev => ev.dataTransfer.files[0] && pickAudio(ev.dataTransfer.files[0]));
audFile.addEventListener('change', ev => ev.target.files[0] && pickAudio(ev.target.files[0]));

function pickImage(file) {
  imgFileObj = file;
  const url = URL.createObjectURL(file);
  imgPreview.src = url; imgPreview.hidden = false; imgHint.hidden = true;
  dlArea.classList.remove('show');
  checkReady();
}
function pickAudio(file) {
  audFileObj = file;
  audIcon.textContent = '✅';
  audHint.textContent = file.name.length > 20 ? file.name.slice(0,18)+'…' : file.name;
  dlArea.classList.remove('show');
  checkReady();
}
function checkReady() {
  const ready = !!imgFileObj && !!audFileObj;
  createBtn.disabled = !ready;
  if (ready) setCreateStatus('dim', 'ready to create');
}
function setCreateStatus(cls, msg) {
  createStatus.innerHTML = cls === 'dim' ? msg : `<span class="${cls}">${msg}</span>`;
}
function setLoop(v) {
  loopCreate = v;
  document.getElementById('btnLoop').classList.toggle('active', v);
  document.getElementById('btnOnce').classList.toggle('active', !v);
}

async function buildSifx() {
  await opusReady;
  createBtn.disabled = true; createBtn.classList.add('working');
  createBtn.textContent = 'working…';
  dlArea.classList.remove('show');

  try {
    setCreateStatus('dim', 'converting image to WebP…');
    const webpBytes = await imageToWebP(imgFileObj);

    setCreateStatus('dim', 'decoding audio…');
    const f32 = await audioToF32(audFileObj, 48000);
    const channels = f32.length;
    const sampleRate = 48000;
    const xfadeMs = parseInt(document.getElementById('xfadeMs').value, 10);
    const gainDb = parseFloat(document.getElementById('gainCreate').value);

    let pcm = f32;
    let xfadeUsed = 0;
    if (loopCreate && xfadeMs > 0) {
      setCreateStatus('dim', 'applying loop crossfade…');
      const result = crossfade(f32, channels, sampleRate, xfadeMs);
      pcm = result.data; xfadeUsed = result.fadeMsUsed;
    }

    setCreateStatus('dim', 'encoding Opus…');
    const FRAME_SAMPLES = 960; // 20ms at 48kHz
    const { packets, totalFrames } = encodeToOpusPackets(pcm, channels, sampleRate, FRAME_SAMPLES);

    setCreateStatus('dim', 'building SIFX container…');
    const saudPayload = buildSaud({
      loopMode: loopCreate ? 1 : 0,
      gainCentibels: Math.round(gainDb * 100),
      crossfadeMs: xfadeUsed,
      sampleRate, channels,
      frameSamples: FRAME_SAMPLES,
      totalFrames, packets,
    });

    // Append SAUD chunk to WebP RIFF
    const riffChunks = parseRiff(webpBytes.buffer);
    const imgChunks = riffChunks.map(c => ({
      id: c.id,
      payload: new Uint8Array(webpBytes.buffer, c.dataStart, c.size),
    }));
    imgChunks.push({ id: 'SAUD', payload: saudPayload });
    const sifxBytes = buildRiff(imgChunks);

    const blob = new Blob([sifxBytes], { type: 'application/vnd.sifx' });
    const url = URL.createObjectURL(blob);
    const name = (imgFileObj.name.replace(/\.[^.]+$/, '') || 'output') + '.sifx';
    dlLink.href = url; dlLink.download = name;
    dlInfo.textContent = `${name} — ${(blob.size/1024).toFixed(1)} KB`;
    dlArea.classList.add('show');

    setCreateStatus('ok', `done — ${(blob.size/1024).toFixed(1)} KB ready to download`);
  } catch(e) {
    setCreateStatus('err', e.message);
    console.error(e);
  } finally {
    createBtn.disabled = false; createBtn.classList.remove('working');
    createBtn.textContent = 'create .sifx';
  }
}
</script>
